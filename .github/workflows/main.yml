name: Build Windows
on: [push, pull_request]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Haxe
        uses: krdlab/setup-haxe@v1
        with:
          haxe-version: 4.3.6

      - name: Cache Haxelib
        uses: actions/cache@v4
        with:
          path: |
            /home/runner/haxelib
            /home/runner/.haxelib
          key: ${{ runner.os }}-haxelib-${{ hashFiles('**/.github/workflows/*.yml') }}
          restore-keys: |
            ${{ runner.os }}-haxelib-

      - name: Install Libraries
        run: |
          haxelib setup /home/runner/haxelib
          haxelib install lime 8.1.2
          haxelib install openfl 9.4.1
          haxelib install flixel 6.1.2
          haxelib install flixel-addons 4.0.1
          haxelib install hscript 2.7.0
          haxelib install hxcpp 4.3.2
          haxelib run lime setup
        shell: pwsh

      - name: Build Game
        run: haxelib run lime build windows
        shell: pwsh

      - name: Upload Finished Game
        uses: actions/upload-artifact@v4
        with:
          name: FlappyBird-Windows-Build
          path: bin/windows/bin/